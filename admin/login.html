<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Sari Deko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      overflow: hidden;
    }

    /* Hintergrund-Muster */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .login-box {
      background: #1a1a1a;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 6px;
      padding: 52px 48px;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo .icon {
      font-size: 2rem;
      color: #c9a84c;
      display: block;
      margin-bottom: 10px;
    }

    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #fff;
    }

    .login-logo p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #c9a84c;
      margin: 0 auto 36px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      color: #fff;
      font-family: 'Raleway', sans-serif;
      font-size: 1rem;
      letter-spacing: 3px;
      transition: border-color 0.3s;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: #c9a84c;
      background: rgba(201,168,76,0.05);
    }

    input[type="password"]::placeholder {
      letter-spacing: 1px;
      color: rgba(255,255,255,0.2);
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: #c9a84c;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .btn-login:hover {
      background: #a07830;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.3);
    }

    .error-msg {
      display: none;
      background: rgba(220,50,50,0.1);
      border: 1px solid rgba(220,50,50,0.3);
      color: #ff6b6b;
      font-size: 0.82rem;
      padding: 10px 14px;
      border-radius: 3px;
      margin-top: 14px;
      text-align: center;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.25);
      text-decoration: none;
      transition: color 0.3s;
    }
    .back-link:hover { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="login-logo">
      <span class="icon">✦</span>
      <h1>Sari Deko</h1>
      <p>Admin-Bereich</p>
    </div>
    <div class="divider"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="Passwort eingeben" autocomplete="off" />
      </div>
      <button type="submit" class="btn-login">Anmelden →</button>
      <div class="error-msg" id="error-msg">❌ Falsches Passwort. Bitte versuche es erneut.</div>
    </form>

    <a href="../index.html" class="back-link">← Zurück zur Website</a>
  </div>

  <script>
    // Admin-Passwort (hier kannst du es ändern)
    const ADMIN_PASSWORD = 'SariDeko2025';

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const eingabe = document.getElementById('password').value;

      if (eingabe === ADMIN_PASSWORD) {
        // Session merken (bis Browser geschlossen wird)
        sessionStorage.setItem('admin_logged_in', 'true');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('password').style.borderColor = 'rgba(220,50,50,0.5)';
        setTimeout(() => {
          document.getElementById('error-msg').style.display = 'none';
          document.getElementById('password').style.borderColor = 'rgba(255,255,255,0.1)';
        }, 3000);
      }
    });
  </script>

</body>
</html>
